name: Create Release

on:
  - push
  - workflow_dispatch

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Create Release
      run: |
        TAG="${GITHUB_REF##*/}-${GITHUB_SHA:0:7}"
        gh release create "$TAG" --draft --title "Draft Release"

  build:
    needs: create_release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: docker://ubuntu:20.04
            name: ubuntu-20.04
          - runner: docker://ubuntu:22.04
            name: ubuntu-22.04
          - runner: docker://archlinux:latest
            name: arch
          - runner: docker://fedora:latest
            name: fedora

    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Install dependencies
      run: |
        if [[ ${{ matrix.name }} == arch ]]; then
          pacman -Syu --noconfirm clang14 libc++
        elif [[ ${{ matrix.name }} == fedora ]]; then
          dnf install -y clang libcxx
        else
          curl -fsSL https://apt.llvm.org/llvm.sh | sudo bash -s -- 14
          sudo apt install -y --no-install-recommends clang-14 libc++-14-dev libc++abi-14-dev
        fi

    - name: Build Release
      id: build_release
      run: |
        CC=clang CXX=clang++ ./prepare-toolchain --
        mv packages/darwin-tools.tar.gz /github/workspace/packages/darwin-tools-${{ matrix.name }}.tar.gz

    - name: Attach Build To Release
      run: |
        TAG="${GITHUB_REF##*/}-${GITHUB_SHA:0:7}"
        gh release upload "$TAG" packages/*.tar.gz
