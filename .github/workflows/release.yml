name: Create Release

on:
  - push
  - workflow_dispatch

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-amd64:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu:20.04
            name: ubuntu20.04
          - runner: ubuntu:22.04
            name: ubuntu22.04
          - runner: archlinux:latest
            name: arch
          - runner: fedora:latest
            name: fedora
          - runner: arm64v8/ubuntu:20.04
            name: ubuntu20.04-aarch64
          - runner: arm64v8/ubuntu:22.04
            name: ubuntu22.04-aarch64
          - runner: lopsided/archlinux-arm64v8:latest
            name: arch-aarch64
          - runner: arm64v8/fedora:latest
            name: fedora-aarch64

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: QEMU fix
      run: |
        if echo "${{ matrix.name }}" | grep -q "aarch64"; then
          docker run --rm --privileged hypriot/qemu-register
        else
          Not aarch64; no fix needed...
        fi

    - name: Build Release
      run: |
        docker run \
          --rm \
          -v $PWD:/workspace \
          -w /workspace \
          ${{ matrix.runner }} \
          sh -c "
            ./prepare-env ${{ matrix.name }}
            CC=clang CXX=clang++ ./prepare-toolchain
            mv packages/darwin-tools.tar.gz packages/darwin-tools-${{ matrix.name }}.tar.gz
          "

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: DT-${{ matrix.name }}
        path: packages/darwin-tools-${{ matrix.name }}.tar.gz

  release:
    needs: [build-amd64, build-aarch64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          pattern: DT-*
          path: packages

      - name: Create and publish release
        run: |
          TAG="${GITHUB_REF##*/}-${GITHUB_SHA:0:7}"
          gh release create "$TAG" --draft --title "Draft Release"
          gh release upload "$TAG" packages/**/*.tar.gz
