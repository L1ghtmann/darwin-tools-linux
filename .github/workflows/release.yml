name: Create Release

on:
  - push
  - workflow_dispatch

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-amd64:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: docker://ubuntu:20.04
            name: ubuntu20.04
          - runner: docker://ubuntu:22.04
            name: ubuntu22.04
          - runner: docker://archlinux:latest
            name: arch
          - runner: docker://fedora:latest
            name: fedora

    runs-on: ubuntu-latest
    container: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    - name: Prepare environment
      run: |
        ./prepare-env ${{ matrix.name }}

    - name: Build Release
      run: |
        CC=clang CXX=clang++ ./prepare-toolchain
        mv packages/darwin-tools.tar.gz packages/darwin-tools-${{ matrix.name }}.tar.gz

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: DT-${{ matrix.name }}
        path: packages/darwin-tools-${{ matrix.name }}.tar.gz

  build-aarch64:
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu20.04
            name: ubuntu20.04
          - distro: ubuntu22.04
            name: ubuntu22.04
          - distro: archarm_latest
            name: arch
          - distro: fedora_latest
            name: fedora

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: uraimo/run-on-arch-action@latest
        name: Build Release
        with:
          arch: aarch64
          distro: ${{ matrix.distro }}
          dockerRunArgs: |
            -v ${PWD}:/runner -w /runner
          env: |
            name: ${{ matrix.name }}
          run: |
            ./prepare-env ${name}
            CC=clang CXX=clang++ ./prepare-toolchain
            mv packages/darwin-tools.tar.gz packages/darwin-tools-${name}-aarch64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DT-${{ matrix.name }}-aarch64
          path: packages/darwin-tools-${{ matrix.name }}-aarch64.tar.gz

  release:
    needs: [build-amd64, build-aarch64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          pattern: DT-*
          path: packages

      - name: Create and publish release
        run: |
          TAG="${GITHUB_REF##*/}-${GITHUB_SHA:0:7}"
          gh release create "$TAG" --draft --title "Draft Release"
          gh release upload "$TAG" packages/**/*.tar.gz
